packages:
  - 'apps/*'
  - 'packages/*'
  - '!**/.github-project'
  - '!**/tickets'
  - '!**/scripts'
  - '!**/docs'

allowBuilds:
  '@parcel/watcher': set this to true or false
  '@swc/core': set this to true or false
  esbuild: set this to true or false
  lmdb: set this to true or false
  msgpackr-extract: set this to true or false

pnpm:
  # pnpm 11.7 推荐格式（在 pnpm: key 下）
  onlyBuiltDependencies:
    - '@parcel/watcher'
    - '@parcel/core'
    - '@parcel/fs'
    - '@parcel/package-manager'
    - '@swc/core'
    - esbuild
    - lmdb
    - msgpackr-extract
    - better-sqlite3
    - playwright
  # overrides 也要在 pnpm: 下
  overrides:
    pino: 9.5.0
    'pino-pretty': 13.0.0
