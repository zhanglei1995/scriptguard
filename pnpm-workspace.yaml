packages:
  - 'apps/*'
  - 'packages/*'
  - 'e2e'
  - '!**/.github-project'
  - '!**/tickets'
  - '!**/scripts'

# pnpm 10+/11 批准 build scripts
allowBuilds:
  '@parcel/watcher': true
  '@parcel/core': true
  '@parcel/fs': true
  '@parcel/package-manager': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  better-sqlite3: true
  playwright: true
  sharp: true
