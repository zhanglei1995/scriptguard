<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="shield-gradient" x1="64" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="code-gradient" x1="40" y1="40" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M64 4 L112 24 L112 64 C112 96 64 124 64 124 C64 124 16 96 16 64 L16 24 Z" 
        fill="url(#shield-gradient)" stroke="#1E40AF" stroke-width="2"/>
  <!-- Inner shield highlight -->
  <path d="M64 12 L104 28 L104 62 C104 90 64 114 64 114 C64 114 24 90 24 62 L24 28 Z" 
        fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.4"/>
  <!-- Code brackets < / > -->
  <g transform="translate(64,64)">
    <!-- Left bracket < -->
    <path d="M-18,-14 L-28,-2 L-18,14" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right bracket > -->
    <path d="M18,-14 L28,-2 L18,14" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Slash / -->
    <line x1="6" y1="-16" x2="-6" y2="16" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Checkmark (guard) -->
    <path d="M-6,0 L-1,6 L10,-8" stroke="#34D399" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
